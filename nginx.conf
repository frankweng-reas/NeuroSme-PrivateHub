# NeuroSme On-Prem — 外層反向代理
#
# 所有請求從 port 80 進來，按路徑分派：
#   /api/*   → NeuroSme backend (port 8000)
#   /auth/*  → LocalAuth        (port 4000)
#   其餘      → NeuroSme frontend (port 3000)
#
# 客戶 IT 只需開放 VM port 80（或 443 若有 TLS）。

upstream neurosme_backend {
    server backend:8000;
}

upstream localauth {
    server localauth:4000;
}

upstream neurosme_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── NeuroSme API ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://neurosme_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Streaming / SSE
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ── LocalAuth (登入 / token) ──────────────────────────────
    location /auth/ {
        proxy_pass         http://localauth;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── 前端（SPA） ───────────────────────────────────────────
    location / {
        proxy_pass         http://neurosme_frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
