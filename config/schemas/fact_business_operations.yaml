# fact_business_operations schema
# 欄位定義與別名，供 LLM 意圖萃取與後端計算使用

id: fact_business_operations

columns:
  event_date:
    type: date
    purposes: [分組, 時間]
    description: 交易/事件日期
    example: "2024-01-15"
  channel_id:
    type: string
    purposes: [分組]
    description: 通路管道
    example: momo
  subject_id:
    type: string
    purposes: [分組]
    description: 交易主體 ID
  item_id:
    type: string
    purposes: [分組]
    description: 品項唯一編號
  item_name:
    type: string
    purposes: [分組]
    description: 品項名稱
    example: 深度保濕精華液
  category_l1:
    type: string
    purposes: [分組]
    description: 大類別
  category_l2:
    type: string
    purposes: [分組]
    description: 次類別
  quantity:
    type: number
    purposes: [數值]
    description: 銷售數量
  gross_amount:
    type: number
    purposes: [數值]
    description: 原始總額
  discount_amount:
    type: number
    purposes: [數值]
    description: 折扣總額
  net_amount:
    type: number
    purposes: [數值, ratio分母]
    description: 銷售金額
  gross_profit:
    type: number
    purposes: [數值, ratio分子]
    description: 毛利金額
  cost_amount:
    type: number
    purposes: [數值]
    description: 預估成本
  tags:
    type: string
    purposes: [擴充]
    description: 擴充標籤

group_aliases:
  平台: [channel_id, channel, 通路, 平台, 店, 分店]
  月份: [event_date, month, 月份, 日期]
  產品名稱: [item_name, item, 品名, 產品]
  品類: [category_l1, category_l2, 品類, 類別]

value_aliases:
  銷售金額: [net_amount, 銷售額, 金額, 實收淨額]
  原始金額: [gross_amount, 原始總額]
  銷售數量: [quantity, 數量]
  毛利: [gross_profit, 毛利]
  營收: [net_amount, revenue, 營收]
  成本: [cost_amount, 預估成本]
